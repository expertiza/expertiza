# This is a basic workflow that uses Capistrano to deploy Expertiza on Production, Test, and Development servers
name: Deploy with Capistrano

# Controls when the workflow will run
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'test'
        type: choice
        options:
          - production
          - development
          - test

jobs:
  production:
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Check Environment Variables
        run: |
          echo "Deploying to Production"
          echo "WIREGUARD_SERVER_PUBLIC_KEY: ***" # Redacted for security
          echo "Private key length (characters):"
          echo "${{ secrets.WIREGUARD_PRIVATE_KEY }}" | wc -c

      - name: Create WireGuard tunnel to deploy Expertiza on private network
        run: |
          echo "Installing WireGuard..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard
          echo "WireGuard installed."

          echo "Creating private key file..."
          echo "${{ secrets.WIREGUARD_PRIVATE_KEY }}" > privatekey
          chmod 600 privatekey
          echo "Private key file created."

          echo "Setting up WireGuard interface wg0..."
          sudo ip link add wg0 type wireguard
          sudo ip address add 10.0.0.2/24 dev wg0
          sudo wg set wg0 private-key privatekey
          sudo ip link set wg0 up
          sudo wg set wg0 peer ${{ secrets.WIREGUARD_SERVER_PUBLIC_KEY }} allowed-ips 10.0.0.1/32 endpoint 152.14.92.215:50000
          echo "WireGuard interface wg0 configured."

          echo "Checking WireGuard interface status:"
          sudo wg show wg0

          echo "Pinging the WireGuard peer to test connectivity..."
          ping -c 4 10.0.0.1 || true 

          echo "Checking if wg0 interface is up and running:"
          sudo ip link show wg0

          echo "Displaying network routes for wg0:"
          ip route show dev wg0

          echo "Checking if the endpoint is reachable..."
          ping -c 4 152.14.92.215 || true  

          echo "Checking for any firewall rules that might be blocking WireGuard traffic..."
          sudo ufw status || echo "UFW not installed or enabled"
          sudo iptables -L || echo "iptables rules not listed"

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.4
          bundler-cache: true

      - name: Debug Ruby Setup
        run: |
          echo "Ruby version:"
          ruby --version
          echo "Bundler version:"
          bundle --version

      - name: Start Capistrano Deployment
        run: |
          echo "Starting Capistrano deployment..."
          /opt/hostedtoolcache/Ruby/2.4.10/x64/bin/bundle exec cap production deploy
        env:
          SSH_AUTH_SOCK: /tmp/ssh-auth-1718350159636.sock
        continue-on-error: true  

  development:
    if: inputs.environment == 'development'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.4
          bundler-cache: true

      - name: Deploy with Capistrano
        uses: miloserdow/capistrano-deploy@master
        with:
          target: development
          enc_rsa_key_val: ${{ secrets.ENCRYPTED_PRIVATE_KEY_DEV }}
          deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}
        env:
          DEBUG: true 

  test:
    if: inputs.environment == 'test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.4
          bundler-cache: true

      - name: Deploy with Capistrano
        uses: miloserdow/capistrano-deploy@master
        with:
          target: staging
          enc_rsa_key_val: ${{ secrets.ENCRYPTED_PRIVATE_KEY_STAGING }}
          deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}
        env:
          DEBUG: true 
