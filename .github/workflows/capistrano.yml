# This is a basic workflow that uses Capistrano to deploy Expertiza on Production, Test, and Development servers
name: Deploy with Capistrano

# Controls when the workflow will run
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'test'
        type: choice
        options:
          - production
          - development
          - test

jobs:
  production:
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Check Environment Variables
        run: |
          echo "Deploying to Production"
          echo "WIREGUARD_SERVER_PUBLIC_KEY: ${{ secrets.WIREGUARD_SERVER_PUBLIC_KEY }}"
          echo "Private key length (characters):"
          echo "${{ secrets.WIREGUARD_PRIVATE_KEY }}" | wc -c

      - name: Create WireGuard tunnel to deploy Expertiza on private network
        run: |
          echo "Installing WireGuard..."
          sudo apt-get update
          sudo apt-get install -y wireguard
          echo "WireGuard installed."

          echo "Creating private key file..."
          echo "${{ secrets.WIREGUARD_PRIVATE_KEY }}" > privatekey
          echo "Private key file created. Contents are sensitive, not displaying for security."

          echo "Setting up WireGuard interface wg0..."
          sudo ip link add wg0 type wireguard
          sudo ip address add 10.0.0.2/24 dev wg0
          sudo wg set wg0 private-key privatekey
          sudo ip link set wg0 up
          sudo wg set wg0 peer ${{ secrets.WIREGUARD_SERVER_PUBLIC_KEY }} allowed-ips 10.0.0.1/32 endpoint 152.14.92.215:50000
          echo "WireGuard interface wg0 configured."

          echo "Checking WireGuard interface status:"
          sudo wg show wg0

          echo "Pinging the WireGuard peer to test connectivity..."
          ping -c 4 10.0.0.1 || echo "Ping failed"

          echo "Checking network interfaces:"
          ip address show wg0

          echo "Listing routes:"
          ip route show

          echo "Performing traceroute to peer (10.0.0.1):"
          sudo apt-get install -y traceroute
          traceroute 10.0.0.1 || echo "Traceroute failed"

          echo "Checking firewall status:"
          sudo ufw status || echo "UFW not installed/enabled"
          sudo iptables -L

          echo "Checking if wg0 interface is up and running:"
          sudo ip link show wg0

          echo "Displaying network routes for wg0:"
          ip route show dev wg0

          echo "Checking kernel routing table for 10.0.0.0/24:"
          ip route get 10.0.0.1

          echo "Testing communication through wg0 interface:"
          sudo curl --interface wg0 http://10.0.0.1 || echo "Curl failed"

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.4
          bundler-cache: true

      - name: Debug Ruby Setup
        run: |
          echo "Ruby version:"
          ruby --version
          echo "Bundler version:"
          bundle --version

      - name: Deploy with Capistrano
        uses: miloserdow/capistrano-deploy@master
        with:
          target: production
          enc_rsa_key_val: ${{ secrets.ENCRYPTED_PRIVATE_KEY_PROD }}
          deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}
        env:
          DEBUG: true # Enables detailed Capistrano logging

  development:
    if: inputs.environment == 'development'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.4
          bundler-cache: true

      - name: Deploy with Capistrano
        uses: miloserdow/capistrano-deploy@master
        with:
          target: development
          enc_rsa_key_val: ${{ secrets.ENCRYPTED_PRIVATE_KEY_DEV }}
          deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}
        env:
          DEBUG: true # Enables detailed Capistrano logging

  test:
    if: inputs.environment == 'test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.4
          bundler-cache: true

      - name: Deploy with Capistrano
        uses: miloserdow/capistrano-deploy@master
        with:
          target: staging
          enc_rsa_key_val: ${{ secrets.ENCRYPTED_PRIVATE_KEY_STAGING }}
          deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}
        env:
          DEBUG: true # Enables detailed Capistrano logging
