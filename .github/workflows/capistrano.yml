name: Deploy with Capistrano

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'test'
        type: choice
        options:
          - production
          - development
          - test

jobs:
  production:
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Install WireGuard and Create Tunnel
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard
          echo "${{ secrets.WIREGUARD_PRIVATE_KEY }}" > privatekey
          chmod 600 privatekey
          sudo ip link add wg0 type wireguard
          sudo ip address add 10.0.0.2/24 dev wg0
          sudo wg set wg0 private-key privatekey
          sudo ip link set wg0 up
          sudo wg set wg0 peer ${{ secrets.WIREGUARD_SERVER_PUBLIC_KEY }} allowed-ips 10.0.0.1/32 endpoint 152.14.92.215:50000
          sudo wg show wg0

      - name: Verify WireGuard Tunnel
        run: |
          echo "Pinging the WireGuard endpoint..."
          ping -c 4 10.0.0.1 || echo "Ping to 10.0.0.1 failed. The endpoint might be unreachable."
          echo "Checking the WireGuard interface..."
          sudo ip link show wg0
          echo "Checking the routes for wg0..."
          ip route show dev wg0
          echo "Pinging the WireGuard server public IP..."
          ping -c 4 152.14.92.215 || echo "Ping to 152.14.92.215 failed. The server might be unreachable."

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.4  # Consider updating this to a newer version if possible.
          bundler-cache: true

      - name: Deploy with Capistrano
        uses: miloserdow/capistrano-deploy@master
        with:
          target: production
          enc_rsa_key_val: ${{ secrets.ENCRYPTED_PRIVATE_KEY_PROD }}
          deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}

  development:
    if: inputs.environment == 'development'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.4  # Consider updating this to a newer version if possible.
          bundler-cache: true

      - name: Deploy with Capistrano
        uses: miloserdow/capistrano-deploy@master
        with:
          target: development
          enc_rsa_key_val: ${{ secrets.ENCRYPTED_PRIVATE_KEY_DEV }}
          deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}

  test:
    if: inputs.environment == 'test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Ruby Environment
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.4  # Consider updating this to a newer version if possible.
          bundler-cache: true

      - name: Deploy with Capistrano
        uses: miloserdow/capistrano-deploy@master
        with:
          target: staging  # Assuming 'staging' is your test environment.
          enc_rsa_key_val: ${{ secrets.ENCRYPTED_PRIVATE_KEY_STAGING }}
          deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}
