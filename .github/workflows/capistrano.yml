name: Deploy with Capistrano

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'test'
        type: choice
        options:
          - production
          - development
          - test

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y iproute2 iputils-ping traceroute nmap wireguard

      - name: Print network information
        run: |
          echo "Network interfaces:"
          ip a
          echo "Routing table:"
          ip route
          echo "Ping test to 10.0.0.1:"
          ping -c 4 10.0.0.1 || true
          echo "Traceroute to 10.0.0.1:"
          traceroute 10.0.0.1 || true
          echo "Checking open ports on 10.0.0.1 with nmap -Pn:"
          nmap -Pn -p 22 10.0.0.1 || true

  production:
    if: inputs.environment == 'production'
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Create WireGuard tunnel to deploy Expertiza on private network
        run: |
          sudo apt install wireguard
          echo "${{ secrets.WIREGUARD_PRIVATE_KEY }}" > privatekey
          sudo ip link add wg0 type wireguard
          sudo ip address add 10.0.0.2/24 dev wg0
          sudo wg set wg0 private-key privatekey
          sudo ip link set wg0 up
          sudo wg set wg0 peer ${{ secrets.WIREGUARD_SERVER_PUBLIC_KEY }} allowed-ips 10.0.0.1/32 endpoint 152.14.199.156:50000
          ping -c 4 10.0.0.1 || true
      - name: Debug Network Configuration
        run: |
          echo "Network interfaces after WireGuard setup:"
          ip a
          echo "Routing table after WireGuard setup:"
          ip route
          echo "Ping test to 10.0.0.1 after WireGuard setup:"
          ping -c 4 10.0.0.1 || true
          echo "Traceroute to 10.0.0.1 after WireGuard setup:"
          traceroute 10.0.0.1 || true
          echo "Checking open ports on 10.0.0.1 with nmap -Pn after WireGuard setup:"
          nmap -Pn -p 22 10.0.0.1 || true

      - uses: actions/checkout@v3
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.4
          bundler-cache: true

      - name: Deploy with Capistrano
        uses: miloserdow/capistrano-deploy@master
        with:
          target: production
          enc_rsa_key_val: ${{ secrets.ENCRYPTED_PRIVATE_KEY_PROD }}
          deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}

  development:
    if: inputs.environment == 'development'
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.4
          bundler-cache: true

      - name: Deploy with Capistrano
        uses: miloserdow/capistrano-deploy@master
        with:
          target: development
          enc_rsa_key_val: ${{ secrets.ENCRYPTED_PRIVATE_KEY_DEV }}
          deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}

  test:
    if: inputs.environment == 'test'
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.4
          bundler-cache: true

      - name: Deploy with Capistrano
        uses: miloserdow/capistrano-deploy@master
        with:
          target: staging
          enc_rsa_key_val: ${{ secrets.ENCRYPTED_PRIVATE_KEY_STAGING }}
          deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}
