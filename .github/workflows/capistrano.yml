# This is a basic workflow that uses Capistrano to deploy Expertiza on Production, Test, and Development servers
name: Deploy with Capistrano

# Controls when the workflow will run
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'test'
        type: choice
        options:
          - production
          - development
          - test

jobs:
  production:
    if: inputs.environment == 'production'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Set up Java Path
        run: |
          echo "JAVA_HOME=/usr/jdk-11" >> $GITHUB_ENV
      - name: Set up Ruby on self-hosted runner
        shell: bash
        run: |
          USER_GEM_BIN="$(ruby -rrubygems -e 'print Gem.user_dir')/bin"
          echo "$USER_GEM_BIN" >> "$GITHUB_PATH"
          ruby -v
          ruby -S gem install bundler -v 1.17.3 --user-install --no-document
          "$USER_GEM_BIN/bundle" _1.17.3_ install --path vendor/bundle --without development test --jobs 4 --retry 3
      - uses: miloserdow/capistrano-deploy@master
        with:
          target: production # Defines the environment for the deployment
          enc_rsa_key_val: ${{ secrets.ENCRYPTED_PRIVATE_KEY_PROD }}
          deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}

# development and test jobs are identical - with different target environment and server keys
  development:
    if: inputs.environment == 'development'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.4
          bundler-cache: true
      - uses: miloserdow/capistrano-deploy@master
        with:
          target: development
          enc_rsa_key_val: ${{ secrets.ENCRYPTED_PRIVATE_KEY_DEV }}
          deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}

  test:
    if: inputs.environment == 'test'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.4
          bundler-cache: true
      - uses: miloserdow/capistrano-deploy@master
        with:
          target: staging
          enc_rsa_key_val: ${{ secrets.ENCRYPTED_PRIVATE_KEY_STAGING }}
          deploy_key: ${{ secrets.DEPLOY_ENC_KEY }}
